version: '3.8'

services:
  # The Full Application
  edtech-app:
    build: .
    container_name: edtech-platform-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      edtech-redis:
        condition: service_healthy
      edtech-db:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules

  # PostgreSQL Database
  edtech-db:
    image: postgres:15-alpine
    container_name: edtech-platform-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - edtech_pg_volume:/var/lib/postgresql/data

  # Redis for Sessions
  edtech-redis:
    image: redis:7-alpine
    container_name: edtech-platform-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  edtech_pg_volume:
