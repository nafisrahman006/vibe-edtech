# ============================================================
#  Auto PR & Merge — dev → main
#  When: push to dev branch + all checks pass
#  Does: creates a PR from dev → main, then auto-merges it
# ============================================================

name: Auto PR & Merge dev → main

on:
  push:
    branches:
      - dev    # triggers only when code is pushed to dev

jobs:

# ===========================================================
# JOB 1 — Lint
# ===========================================================
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

# ===========================================================
# JOB 2 — Test
# ===========================================================
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: echo "No tests yet — skipping"
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

# ===========================================================
# JOB 3 — Create PR + Auto Merge (runs only if lint & test pass)
# ===========================================================
  auto-pr-merge:
    name: 🔀 Create PR & Auto Merge
    runs-on: ubuntu-latest
    needs: [lint, test]    # ← only runs if BOTH pass

    permissions:
      contents: write        # needed to merge
      pull-requests: write   # needed to create PR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Create PR from dev → main ───────────────────────────────────────
      - name: Create Pull Request
        id: create-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            // Check if a PR already exists for dev → main
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:dev`,
              base: 'main',
              state: 'open'
            });

            let pr;

            if (existingPRs.length > 0) {
              // PR already exists, reuse it
              pr = existingPRs[0];
              console.log(`✅ PR already exists: #${pr.number} — ${pr.html_url}`);
            } else {
              // Create a new PR
              const { data: newPR } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚀 Auto PR: dev → main (${context.sha.slice(0, 7)})`,
                head: 'dev',
                base: 'main',
                body: [
                  '## Automated Pull Request',
                  '',
                  '| | |',
                  '|---|---|',
                  '| **Branch** | `dev` → `main` |',
                  `| **Commit** | \`${context.sha.slice(0, 7)}\` |`,
                  `| **Triggered by** | @${context.actor} |`,
                  '',
                  '### ✅ All checks passed',
                  '- Lint passed',
                  '- Tests passed',
                  '',
                  '_This PR was created automatically by the CI/CD pipeline._'
                ].join('\n')
              });
              pr = newPR;
              console.log(`✅ PR created: #${pr.number} — ${pr.html_url}`);
            }

            // Save PR number for next step
            core.setOutput('pr_number', pr.number);

      # ── Auto merge the PR ───────────────────────────────────────────────
      - name: Auto Merge PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const prNumber = parseInt('${{ steps.create-pr.outputs.pr_number }}');

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash',   // options: squash | merge | rebase
              commit_title: `🚀 Auto merge dev → main (#${prNumber})`,
              commit_message: 'Automatically merged after all checks passed.'
            });

            console.log(`✅ PR #${prNumber} merged into main successfully!`);